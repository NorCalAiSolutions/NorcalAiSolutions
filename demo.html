<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Demo | NorCal AI Solutions LLC</title>
  <style>
    :root {
      --ink: #09213d;
      --muted: #5d6c7e;
      --line: #c8d6e2;
      --white: #ffffff;
      --pine: #0f6b55;
      --orange: #f5841f;
      --shadow: 0 24px 60px rgba(9, 33, 61, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef6f3 0%, #ffffff 42%, #f5f8fb 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .nav-wrap {
      padding: 22px clamp(18px, 4vw, 48px) 0;
    }

    .navbar {
      max-width: 1180px;
      min-height: 84px;
      margin: 0 auto;
      padding: 12px 16px;
      border: 1px solid rgba(15, 107, 85, 0.12);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 12px 34px rgba(9, 33, 61, 0.09);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      object-position: center 33%;
      border-radius: 14px;
    }

    .brand-text {
      font-weight: 800;
      font-size: 1.02rem;
      line-height: 1.15;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 17px;
      border-radius: 14px;
      background: var(--ink);
      color: var(--white);
      font-weight: 750;
      box-shadow: 0 10px 22px rgba(9, 33, 61, 0.18);
    }

    .home-link:hover {
      background: var(--pine);
    }

    main {
      min-height: calc(100vh - 106px);
      padding: clamp(52px, 8vw, 96px) clamp(14px, 4vw, 48px);
      display: grid;
      place-items: start center;
    }

    .demo-card {
      width: min(920px, 100%);
      padding: clamp(32px, 5vw, 52px) clamp(28px, 7vw, 72px);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .demo-form {
      display: grid;
      gap: 26px;
    }

    .field,
    .select {
      width: 100%;
      min-height: 62px;
      padding: 0 22px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8fafc;
      color: var(--ink);
      font: inherit;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
    }

    .field::placeholder,
    .select:invalid {
      color: #9aa7b4;
    }

    .question {
      margin: 0 0 -12px;
      color: #020b16;
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      font-weight: 750;
      line-height: 1.18;
    }

    .submit-row {
      display: flex;
      justify-content: center;
      padding-top: 18px;
    }

    .submit-button {
      min-height: 60px;
      min-width: 220px;
      padding: 0 28px;
      border: 0;
      border-radius: 4px;
      background: var(--ink);
      color: var(--white);
      font: inherit;
      font-size: 1.08rem;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(9, 33, 61, 0.16);
    }

    .submit-button:hover {
      background: var(--pine);
    }

    @media (max-width: 680px) {
      .navbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .home-link {
        width: 100%;
      }

      .demo-card {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>
  <header class="nav-wrap">
    <nav class="navbar" aria-label="Demo navigation">
      <a class="brand" href="index.html">
        <img src="companyLogo.png" alt="NorCal AI Solutions LLC logo" />
        <span class="brand-text">NorCal AI<br />Solutions LLC</span>
      </a>
      <a class="home-link" href="index.html">Back to Home</a>
    </nav>
  </header>

  <main>
    <section class="demo-card" aria-label="Request a demo">
      <form class="demo-form" action="mailto:akhil100@gmail.com" method="post" enctype="text/plain">
        <input class="field" type="email" name="Company Email" placeholder="Your Company Email*" required />
        <input class="field" type="text" name="First Name" placeholder="First Name" />
        <input class="field" type="text" name="Last Name" placeholder="Last Name" />

        <p class="question">How soon would you like a demo?</p>
        <select class="select" name="Demo Timing" required>
          <option value="" selected disabled>Please Select</option>
          <option value="Within a Week">Within a Week</option>
          <option value="Within a Month">Within a Month</option>
          <option value="In this Quarter">In this Quarter</option>
          <option value="Will let you know">Will let you know</option>
        </select>

        <div class="submit-row">
          <button class="submit-button" type="submit">Request a demo</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
